<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Strategy Studio | Consultoría para hispanohablantes en Europa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        html { scroll-behavior: smooth; }
        .transition { transition: all 0.2s ease; }
        .tab-active { background-color: #4f46e5; color: white; }
        .tab-inactive { background-color: #e5e7eb; color: #374151; }
    </style>
</head>
<body class="bg-white text-gray-800">

    <!-- NAV -->
    <nav class="border-b border-gray-200 bg-white/90 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <img src="img/logo.png" alt="Logo" class="h-20 w-auto">

                <div class="hidden md:flex space-x-8">
                    <a href="#nosotros" class="nav-link text-gray-600 hover:text-indigo-600">Nosotros</a>
                    <a href="#metodologia" class="nav-link text-gray-600 hover:text-indigo-600">Metodología</a>
                    <a href="#servicios-precios" class="nav-link text-gray-600 hover:text-indigo-600">Servicios</a>
                    <a href="#precios" class="nav-link text-gray-600 hover:text-indigo-600">Precios</a>
                    <a href="#testimonios" class="nav-link text-gray-600 hover:text-indigo-600">Testimonios</a>
                    <a href="#faq" class="nav-link text-gray-600 hover:text-indigo-600">FAQ</a>
                </div>

                <div class="flex items-center gap-4">
                    <button onclick="cambiarIdioma('es')" id="btn-es" class="px-2 py-1 rounded text-sm font-semibold bg-indigo-600 text-white">🇪🇸 ES</button>
                    <button onclick="cambiarIdioma('en')" id="btn-en" class="px-2 py-1 rounded text-sm font-semibold bg-gray-200 text-gray-700">🇬🇧 EN</button>
                    <button onclick="cambiarIdioma('pt')" id="btn-pt" class="px-2 py-1 rounded text-sm font-semibold bg-gray-200 text-gray-700">🇧🇷 PT</button>

                    <button onclick="toggleCart()" class="relative text-2xl hover:text-indigo-600 transition">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="cart-count" class="absolute -top-2 -right-2 bg-pink-500 text-white text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- HERO (ejemplo) -->
    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 md:py-24 text-center">
        <h1 class="text-4xl md:text-5xl font-bold text-gray-900">Career Strategy Studio</h1>
        <p class="mt-4 text-xl text-gray-600">Tu carrera merece una estrategia clara</p>
    </section>

    <!-- PRECIOS -->
    <section id="precios" class="py-16 bg-gray-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h2 class="text-3xl font-bold text-center mb-8">Servicios y precios</h2>
            <div id="precios-contenedor" class="grid md:grid-cols-3 gap-8"></div>
        </div>
    </section>

    <!-- CARRITO -->
    <div id="cart-sidebar" class="hidden fixed top-0 right-0 h-full w-full md:w-96 bg-white shadow-2xl z-[100] overflow-y-auto border-l">
        <div class="p-6 border-b flex justify-between items-center">
            <h3 class="text-2xl font-bold">Tu Carrito</h3>
            <button onclick="toggleCart()" class="text-3xl text-gray-400 hover:text-gray-600">×</button>
        </div>
        <div id="cart-items" class="p-6"></div>
        <div class="p-6 border-t">
            <div class="flex justify-between text-lg font-semibold mb-6">
                <span>Total:</span>
                <span id="cart-total" class="text-indigo-600">€0</span>
            </div>
            <button onclick="proceedToPayment()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-semibold text-lg">
                Proceder al pago por WhatsApp
            </button>
        </div>
    </div>
    <div id="cart-overlay" onclick="toggleCart()" class="hidden fixed inset-0 bg-black/50 z-[99]"></div>

    <footer class="bg-gray-900 text-white py-8 text-center">
        <p>© 2026 Career Strategy Studio</p>
    </footer>

    <script>
        let cart = [];

        // NAVEGACIÓN SUAVE (esto arregla las pestañas)
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                const targetId = this.getAttribute('href').substring(1);
                const target = document.getElementById(targetId);
                if (target) {
                    e.preventDefault();
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });

        function addToCart(name, price) {
            cart.push({ name, price });
            document.getElementById('cart-count').textContent = cart.length;
            toggleCart();
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('hidden');
            document.getElementById('cart-overlay').classList.toggle('hidden');
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            let total = 0;

            if (cart.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 py-12">Tu carrito está vacío</p>';
                document.getElementById('cart-total').textContent = '€0';
                return;
            }

            cart.forEach((item, i) => {
                total += item.price;
                container.innerHTML += `
                    <div class="flex justify-between bg-gray-100 p-4 rounded-xl mb-3">
                        <div>
                            <p class="font-medium">${item.name}</p>
                            <p class="text-sm text-gray-500">€${item.price}</p>
                        </div>
                        <button onclick="removeFromCart(${i})" class="text-red-500">Eliminar</button>
                    </div>`;
            });
            document.getElementById('cart-total').textContent = `€${total}`;
        }

        function removeFromCart(i) {
            cart.splice(i, 1);
            document.getElementById('cart-count').textContent = cart.length;
            renderCart();
        }

        function proceedToPayment() {
            if (cart.length === 0) return;
            let total = cart.reduce((sum, item) => sum + item.price, 0);
            let msg = `Hola, quiero comprar:\n\n`;
            cart.forEach(item => msg += `- ${item.name} → €${item.price}\n`);
            msg += `\nTotal: €${total}\n\nQuiero agendar mi sesión. ¿Cuándo tienes disponibilidad?`;

            window.open(`https://wa.me/353876071392?text=${encodeURIComponent(msg)}`, '_blank');

            setTimeout(() => {
                cart = [];
                document.getElementById('cart-count').textContent = '0';
                toggleCart();
            }, 1500);
        }

        // Inicializar
        window.onload = () => {
            document.getElementById('cart-count').textContent = '0';
            console.log("✅ Página cargada correctamente");
        };
    </script>
</body>
</html>
